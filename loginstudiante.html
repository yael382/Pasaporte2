<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Student Login - Tech Event 2024</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#6C132B", // Burgundy
                        "primary-hover": "#550F22",
                        "background-light": "#F3F4F6",
                        "background-dark": "#1A1010",
                        "card-light": "#FFFFFF",
                        "card-dark": "#2A1D1D",
                        "input-light": "#F9FAFB",
                        "input-dark": "#382626",
                        "border-light": "#E5E7EB",
                        "border-dark": "#4A3535",
                        "text-main-light": "#111827",
                        "text-main-dark": "#F3F4F6",
                        "text-sub-light": "#6B7280",
                        "text-sub-dark": "#9CA3AF",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                    },
                    boxShadow: {
                        'glow': '0 0 20px rgba(108, 19, 43, 0.15)',
                        'glow-dark': '0 0 30px rgba(108, 19, 43, 0.1)',
                    }
                },
            },
        };
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }.bg-grid-pattern {
            background-image: linear-gradient(to right, rgba(0,0,0,0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .dark .bg-grid-pattern {
            background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-center p-4 transition-colors duration-300">
<div class="fixed inset-0 bg-grid-pattern pointer-events-none z-0"></div>
<button class="fixed top-4 right-4 z-50 p-2 rounded-full bg-white dark:bg-card-dark shadow-md text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" onclick="document.documentElement.classList.toggle('dark')">
<span class="material-icons dark:hidden">dark_mode</span>
<span class="material-icons hidden dark:block">light_mode</span>
</button>
<div class="w-full max-w-md relative z-10">
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-auto h-24 mb-4">
<img alt="UTVAM Logo" class="h-full w-auto object-contain" src="{{DATA:IMAGE:IMAGE_5}}"/>
</div>
<h1 class="text-3xl font-bold text-text-main-light dark:text-text-main-dark tracking-tight">UTVAM</h1>
<p class="mt-2 text-text-sub-light dark:text-text-sub-dark">Semana de Tecnología</p>
</div>
<div class="bg-card-light dark:bg-card-dark rounded-2xl shadow-xl dark:shadow-glow-dark overflow-hidden border border-border-light dark:border-border-dark transition-colors duration-300">
<div class="bg-primary p-6 text-center relative overflow-hidden">
<div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
<h2 class="text-white text-xl font-bold relative z-10 uppercase tracking-wider">Acceso Estudiantes</h2>
<p class="text-sm mt-1 relative z-10 opacity-90 text-white">Ingresa a tu cuenta para gestionar tu pasaporte</p>
</div>
<div class="p-8 space-y-6">
<div class="space-y-2">
<label class="block text-xs font-semibold uppercase tracking-wide text-text-sub-light dark:text-text-sub-dark" for="matricula">
                        Matrícula / ID Number
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-icons text-gray-400 group-focus-within:text-primary transition-colors text-xl">badge</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-border-light dark:border-border-dark rounded-lg bg-input-light dark:bg-input-dark text-text-main-light dark:text-text-main-dark placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-sm" id="matricula" placeholder="A01234567" type="text"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-xs font-semibold uppercase tracking-wide text-text-sub-light dark:text-text-sub-dark" for="password">
                            Contraseña
                        </label>
<a class="text-xs font-medium text-primary hover:text-primary-hover transition-colors" href="#">
                            ¿Olvidaste tu contraseña?
                        </a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-icons text-gray-400 group-focus-within:text-primary transition-colors text-xl">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-border-light dark:border-border-dark rounded-lg bg-input-light dark:bg-input-dark text-text-main-light dark:text-text-main-dark placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-sm" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded bg-input-light dark:bg-input-dark dark:border-border-dark" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-text-main-light dark:text-text-main-dark" for="remember-me">
                        Mantener sesión iniciada
                    </label>
</div>
<button class="w-full flex justify-center items-center py-3.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-primary hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all transform hover:scale-[1.01] active:scale-[0.99] bg-primary hover:bg-primary-hover" type="button"><span class="material-icons mr-2 text-lg">login</span>
                    INGRESAR AL SISTEMA</button>
<div class="text-center pt-2">
<p class="text-sm text-text-sub-light dark:text-text-sub-dark">
                        ¿No tienes cuenta? 
                        <a class="font-medium text-primary hover:text-primary-hover transition-colors" href="#">
                            Regístrate aquí
                        </a>
</p>
</div>
</div>
<div class="bg-gray-50 dark:bg-[#251818] px-6 py-3 border-t border-border-light dark:border-border-dark flex justify-between items-center text-xs">
<div class="flex items-center text-green-600 dark:text-green-500 font-medium">
<span class="material-icons text-xs mr-1">verified_user</span>
                    CONEXIÓN SEGURA
                </div>
<div class="text-text-sub-light dark:text-text-sub-dark font-mono opacity-70">
                    V2.4.0
                </div>
</div>
</div>
<div class="mt-8 text-center space-y-2">
<p class="text-xs text-text-sub-light dark:text-text-sub-dark opacity-60">
                © 2024 TechCore Events. Todos los derechos reservados.
            </p>
<div class="flex justify-center space-x-4 text-xs text-text-sub-light dark:text-text-sub-dark opacity-50">
<a class="hover:text-primary transition-colors" href="#">Privacidad</a>
<span>•</span>
<a class="hover:text-primary transition-colors" href="#">Términos</a>
<span>•</span>
<a class="hover:text-primary transition-colors" href="#">Ayuda</a>
</div>
</div>
</div>
</body></html>
